<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nxt4 TV</title>
<script src="hls.min.js"></script>
<style>
  :root {
    --bg: #14251b;
    --panel: #1b3025;
    --panel-2: #234133;
    --line: #2f4d3c;
    --text: #e8f0e8;
    --muted: #8fae98;
    --accent: #c3ec3f;
    --accent-dim: #6f8a2a;
    --live: #ff6b6b;
    --focus: #c3ec3f;
    --radius: 10px;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 18px; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  button, input { font-family: inherit; }

  /* Focus ring — the single most important thing for TV */
  .focusable { transition: box-shadow .12s, background .12s, transform .12s; }
  .focusable:focus, .focusable.focused {
    outline: none;
    box-shadow: 0 0 0 3px var(--focus), 0 0 20px rgba(195,236,63,0.4);
    background: var(--panel-2);
    z-index: 5;
  }

  /* ---------- Login ---------- */
  #login {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(1400px 700px at 20% -10%, rgba(195,236,63,0.08), transparent 60%),
      radial-gradient(1000px 600px at 100% 110%, rgba(195,236,63,0.05), transparent 60%),
      var(--bg);
    z-index: 100;
  }
  /* ---- Nxt4 wordmark ---- */
  .nxt4 { display: flex; align-items: flex-start; justify-content: center; gap: 4px; line-height: .9;
    font-weight: 800; font-style: italic; letter-spacing: -0.02em; }
  .nxt4 .lg { font-size: 84px; }
  .nxt4 .ltr { color: var(--text); }
  .nxt4 .lime { color: var(--accent); }
  .nxt4 .tm { color: var(--accent); font-size: 22px; font-style: normal; font-weight: 700; margin-top: 6px; }
  /* crossed-paddle × (SVG) */
  .paddle-x { display: inline-block; width: 1.25em; height: 1.25em; vertical-align: middle; margin: 0 -.02em; position: relative; top: -.06em; }
  .paddle-x svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .nxt4-tag { text-align: center; font-style: italic; font-weight: 700; color: var(--accent);
    font-size: 22px; margin-top: 14px; letter-spacing: .01em; }
  .nxt4-tag .dash { letter-spacing: .05em; }

  .login-card { width: min(560px, 90vw); background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 44px; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .brand .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
  .brand h1 { font-size: 26px; letter-spacing: -0.02em; font-weight: 700; }
  .brand h1 span { color: var(--accent); }
  .login-card p.sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .field input { width: 100%; padding: 15px 16px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); color: var(--text); font-size: 18px; }
  .field input:focus { outline: none; box-shadow: 0 0 0 3px var(--focus); }
  .btn-primary { width: 100%; padding: 16px; margin-top: 10px; background: var(--accent); color: #04160d; font-weight: 700; border: none; border-radius: var(--radius); font-size: 18px; }
  .btn-primary.focused, .btn-primary:focus { outline: none; box-shadow: 0 0 0 3px #fff, 0 0 24px var(--accent); }
  .btn-primary:disabled { opacity: .6; }
  .err { color: var(--live); font-size: 15px; margin-top: 14px; min-height: 20px; }
  .hint { color: var(--muted); font-size: 13px; margin-top: 20px; line-height: 1.6; }

  /* ---------- App shell ---------- */
  #app { display: none; height: 100%; grid-template-columns: 260px 400px 1fr; }
  #app.on { display: grid; }
  .col { height: 100%; overflow-y: auto; border-right: 1px solid var(--line); scrollbar-width: none; }
  .col::-webkit-scrollbar { display: none; }

  .nav { background: var(--panel); padding: 22px 16px; }
  .nav .brand { padding: 6px 8px 22px; }
  .nav .brand h1 { font-size: 22px; }
  .seg { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .seg button { padding: 14px 16px; background: var(--bg); border: 1px solid var(--line); color: var(--muted); font-size: 16px; font-weight: 600; border-radius: 10px; text-align: left; }
  .seg button.active { color: var(--accent); border-color: var(--accent-dim); }
  .cat-search, .col-head input { width: 100%; padding: 13px 14px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; color: var(--text); font-size: 15px; margin-bottom: 12px; }
  .cat-search:focus, .col-head input:focus { outline: none; box-shadow: 0 0 0 3px var(--focus); }
  .cat-item { padding: 13px 14px; border-radius: 10px; color: var(--muted); font-size: 16px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-item.active { color: var(--accent); }
  .logout { margin-top: 22px; width: 100%; padding: 13px; background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 10px; font-size: 15px; }
  .logout.focused { color: var(--live); box-shadow: 0 0 0 3px var(--live); }

  .channels { background: var(--panel); }
  .col-head { position: sticky; top: 0; background: var(--panel); padding: 18px 16px 12px; border-bottom: 1px solid var(--line); z-index: 2; }
  .ch-list { padding: 10px; }
  .ch { display: flex; align-items: center; gap: 14px; padding: 13px 14px; border-radius: 10px; margin-bottom: 4px; }
  .ch.active { background: linear-gradient(90deg, rgba(195,236,63,0.16), transparent); box-shadow: inset 3px 0 0 var(--accent); }
  .ch img, .ch .noimg { width: 52px; height: 52px; border-radius: 9px; object-fit: contain; background: var(--bg); flex-shrink: 0; }
  .ch .noimg { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 20px; }
  .ch .meta { min-width: 0; }
  .ch .title { font-size: 16px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ch .sub { font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .empty { padding: 50px 24px; text-align: center; color: var(--muted); font-size: 16px; line-height: 1.7; }

  .stage { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  .video-wrap { position: relative; background: #000; aspect-ratio: 16/9; width: 100%; }
  .video-wrap video { width: 100%; height: 100%; background: #000; }
  .video-wrap.fs { position: fixed; inset: 0; z-index: 90; aspect-ratio: auto; }
  .video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--muted); text-align: center; }
  .video-placeholder .ico { font-size: 54px; opacity: .5; }
  .now { padding: 24px 28px; border-top: 1px solid var(--line); overflow-y: auto; flex: 1; scrollbar-width: none; }
  .now::-webkit-scrollbar { display: none; }
  .now .live-tag { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; color: var(--live); text-transform: uppercase; margin-bottom: 10px; }
  .now .live-tag .pulse { width: 9px; height: 9px; border-radius: 50%; background: var(--live); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .now h2 { font-size: 26px; letter-spacing: -0.02em; margin-bottom: 8px; }
  .now .now-sub { color: var(--muted); font-size: 15px; font-family: var(--mono); }
  .now .buffering { color: var(--accent); font-size: 14px; margin-top: 14px; }
  .now .stream-err { color: var(--live); font-size: 15px; margin-top: 14px; line-height: 1.5; }

  .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0; transition: width .3s; z-index: 200; box-shadow: 0 0 8px var(--accent); }
</style>
</head>
<body>

<div class="loading-bar" id="loadbar"></div>

<div id="login">
  <div class="login-card">
    <div class="nxt4 lg">
      <span class="ltr">N</span>
      <span class="paddle-x"><svg viewBox="0 0 100 100"><g transform="rotate(45 50 50)"><rect x="41" y="14" width="18" height="72" rx="9" fill="var(--text)"/><circle cx="50" cy="26" r="4" fill="var(--accent)"/><circle cx="46" cy="42" r="2.3" fill="var(--bg)"/><circle cx="54" cy="42" r="2.3" fill="var(--bg)"/><circle cx="46" cy="52" r="2.3" fill="var(--bg)"/><circle cx="54" cy="52" r="2.3" fill="var(--bg)"/><rect x="45" y="64" width="10" height="14" rx="5" fill="var(--accent)"/></g><g transform="rotate(-45 50 50)"><rect x="41" y="14" width="18" height="72" rx="9" fill="var(--accent)"/><circle cx="50" cy="26" r="4" fill="var(--bg)"/><circle cx="46" cy="42" r="2.3" fill="var(--bg)"/><circle cx="54" cy="42" r="2.3" fill="var(--bg)"/><circle cx="46" cy="52" r="2.3" fill="var(--bg)"/><circle cx="54" cy="52" r="2.3" fill="var(--bg)"/><rect x="45" y="64" width="10" height="14" rx="5" fill="var(--bg)"/></g></svg></span>
      <span class="ltr">T</span>
      <span class="lime">4</span>
      <span class="tm">™</span>
    </div>
    <p class="sub" style="text-align:center;margin-top:22px">Sign in with your Xtream Codes account.</p>
    <div class="field"><label>Server URL</label><input id="host" class="focusable" placeholder="http://example.com:8080" autocomplete="off" spellcheck="false"></div>
    <div class="field"><label>Username</label><input id="user" class="focusable" autocomplete="off" spellcheck="false"></div>
    <div class="field"><label>Password</label><input id="pass" class="focusable" type="password" autocomplete="off"></div>
    <button class="btn-primary focusable" id="loginBtn">Connect</button>
    <div class="err" id="loginErr"></div>
    <p class="hint">Use the D-pad to move, center button to select. Credentials stay on this device.</p>
  </div>
</div>

<div id="app">
  <div class="col nav" data-col="0">
    <div class="nxt4" style="justify-content:flex-start;padding:6px 8px 22px;font-size:30px">
      <span class="ltr">N</span><span class="paddle-x"><svg viewBox="0 0 100 100"><g transform="rotate(45 50 50)"><rect x="41" y="14" width="18" height="72" rx="9" fill="var(--text)"/><circle cx="50" cy="26" r="4" fill="var(--accent)"/><circle cx="46" cy="42" r="2.3" fill="var(--bg)"/><circle cx="54" cy="42" r="2.3" fill="var(--bg)"/><circle cx="46" cy="52" r="2.3" fill="var(--bg)"/><circle cx="54" cy="52" r="2.3" fill="var(--bg)"/><rect x="45" y="64" width="10" height="14" rx="5" fill="var(--accent)"/></g><g transform="rotate(-45 50 50)"><rect x="41" y="14" width="18" height="72" rx="9" fill="var(--accent)"/><circle cx="50" cy="26" r="4" fill="var(--bg)"/><circle cx="46" cy="42" r="2.3" fill="var(--bg)"/><circle cx="54" cy="42" r="2.3" fill="var(--bg)"/><circle cx="46" cy="52" r="2.3" fill="var(--bg)"/><circle cx="54" cy="52" r="2.3" fill="var(--bg)"/><rect x="45" y="64" width="10" height="14" rx="5" fill="var(--bg)"/></g></svg></span><span class="ltr">T</span><span class="lime">4</span><span class="tm" style="font-size:11px;margin-top:2px">™</span>
    </div>
    <div class="seg">
      <button data-type="live" class="active focusable">Live TV</button>
      <button data-type="vod" class="focusable">Movies</button>
      <button data-type="series" class="focusable">Series</button>
    </div>
    <input class="cat-search focusable" id="catSearch" placeholder="Filter categories…">
    <div id="catList"></div>
    <button class="logout focusable" id="logout">Sign out</button>
  </div>

  <div class="col channels" data-col="1">
    <div class="col-head"><input id="chSearch" class="focusable" placeholder="Search channels…"></div>
    <div class="ch-list" id="chList"><div class="empty">Pick a category.</div></div>
  </div>

  <div class="col stage" data-col="2">
    <div class="video-wrap" id="videoWrap">
      <video id="video" playsinline></video>
      <div class="video-placeholder" id="placeholder"><div class="ico">▶</div><div>Select a channel to start</div></div>
    </div>
    <div class="now" id="now"><div class="empty" style="text-align:left;padding:0">Nothing playing yet.</div></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const loadbar = $('#loadbar');
let progress=0, progTimer=null;
function startLoad(){ progress=8; loadbar.style.width='8%'; clearInterval(progTimer); progTimer=setInterval(()=>{progress=Math.min(progress+Math.random()*12,88);loadbar.style.width=progress+'%';},300); }
function endLoad(){ clearInterval(progTimer); loadbar.style.width='100%'; setTimeout(()=>loadbar.style.width='0',350); }

const store = {
  get creds(){ try{return JSON.parse(localStorage.getItem('xtream_creds'));}catch{return null;} },
  set creds(v){ localStorage.setItem('xtream_creds',JSON.stringify(v)); },
  clear(){ localStorage.removeItem('xtream_creds'); }
};
let CREDS=null;
let state={ type:'live', cats:[], activeCat:null, channels:[], activeCh:null };
let hls=null;
const enc=encodeURIComponent;
const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

function apiBase(){ return `${CREDS.host}/player_api.php?username=${enc(CREDS.user)}&password=${enc(CREDS.pass)}`; }
async function api(params){ const r=await fetch(`${apiBase()}&${params}`); if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); }

/* ---------- Auth ---------- */
async function connect(host,user,pass){
  host=host.trim().replace(/\/+$/,''); if(!/^https?:\/\//i.test(host))host='http://'+host;
  CREDS={host,user:user.trim(),pass:pass.trim()};
  const r=await fetch(`${host}/player_api.php?username=${enc(CREDS.user)}&password=${enc(CREDS.pass)}`);
  if(!r.ok)throw new Error('Server returned '+r.status);
  const d=await r.json();
  if(!d.user_info||d.user_info.auth===0)throw new Error('Invalid username or password.');
  if(d.user_info.status&&d.user_info.status.toLowerCase()!=='active')throw new Error('Account status: '+d.user_info.status);
  store.creds=CREDS; return d;
}
$('#loginBtn').addEventListener('click',async()=>{
  const btn=$('#loginBtn'),err=$('#loginErr'); err.textContent='';
  const host=$('#host').value,user=$('#user').value,pass=$('#pass').value;
  if(!host||!user||!pass){err.textContent='Fill in all fields.';return;}
  btn.disabled=true;btn.textContent='Connecting…';startLoad();
  try{ await connect(host,user,pass); endLoad(); enterApp(); }
  catch(e){ endLoad(); err.textContent=e.message.includes('Failed to fetch')?'Could not reach server. Check the URL and port.':e.message; }
  finally{ btn.disabled=false; btn.textContent='Connect'; }
});
$('#logout').addEventListener('click',()=>{
  store.clear(); if(hls){hls.destroy();hls=null;}
  $('#app').classList.remove('on'); $('#login').style.display='flex';
  $('#host').value=$('#user').value=$('#pass').value='';
  setTimeout(()=>focusEl($('#host')),50);
});
function enterApp(){ $('#login').style.display='none'; $('#app').classList.add('on'); loadCategories(); setTimeout(()=>focusFirstInCol(0),100); }

/* ---------- Categories ---------- */
const catAction={live:'get_live_categories',vod:'get_vod_categories',series:'get_series_categories'};
const streamAction={live:'get_live_streams',vod:'get_vod_streams',series:'get_series'};
async function loadCategories(){
  const list=$('#catList'); list.innerHTML='<div class="empty">Loading…</div>'; startLoad();
  try{ const c=await api('action='+catAction[state.type]); state.cats=Array.isArray(c)?c:[]; renderCategories(); }
  catch{ list.innerHTML='<div class="empty">Failed to load.</div>'; } finally{ endLoad(); }
}
function renderCategories(){
  const q=$('#catSearch').value.toLowerCase(), list=$('#catList');
  const f=state.cats.filter(c=>c.category_name.toLowerCase().includes(q));
  if(!f.length){list.innerHTML='<div class="empty">No categories.</div>';return;}
  list.innerHTML='';
  f.forEach(c=>{
    const d=document.createElement('div');
    d.className='cat-item focusable'+(state.activeCat===c.category_id?' active':'');
    d.tabIndex=0; d.textContent=c.category_name;
    d.onclick=()=>{ state.activeCat=c.category_id; renderCategories(); loadChannels(c.category_id); };
    list.appendChild(d);
  });
}
$('#catSearch').addEventListener('input',renderCategories);

/* ---------- Channels ---------- */
async function loadChannels(catId){
  const list=$('#chList'); list.innerHTML='<div class="empty">Loading channels…</div>'; startLoad();
  try{ const s=await api(`action=${streamAction[state.type]}&category_id=${catId}`); state.channels=Array.isArray(s)?s:[]; renderChannels(); }
  catch{ list.innerHTML='<div class="empty">Failed to load.</div>'; } finally{ endLoad(); }
}
function renderChannels(){
  const q=$('#chSearch').value.toLowerCase(), list=$('#chList');
  const items=state.channels.filter(c=>(c.name||'').toLowerCase().includes(q));
  if(!items.length){list.innerHTML='<div class="empty">No channels.</div>';return;}
  list.innerHTML='';
  items.forEach(c=>{
    const id=c.stream_id||c.series_id, logo=c.stream_icon||c.cover;
    const div=document.createElement('div');
    div.className='ch focusable'+(state.activeCh===id?' active':''); div.tabIndex=0;
    const img=logo?`<img src="${esc(logo)}" onerror="this.outerHTML='<div class=noimg>◉</div>'">`:`<div class="noimg">◉</div>`;
    const sub=state.type==='live'?'LIVE':(c.rating?'★ '+c.rating:(state.type==='series'?'SERIES':'MOVIE'));
    div.innerHTML=`${img}<div class="meta"><div class="title">${esc(c.name||'Untitled')}</div><div class="sub">${sub}</div></div>`;
    div.onclick=()=>play(c);
    list.appendChild(div);
  });
}
$('#chSearch').addEventListener('input',renderChannels);

/* ---------- Playback ---------- */
function streamUrl(c){
  const id=c.stream_id, ext=c.container_extension||(state.type==='live'?'m3u8':'mp4');
  if(state.type==='live')return `${CREDS.host}/live/${enc(CREDS.user)}/${enc(CREDS.pass)}/${id}.m3u8`;
  if(state.type==='vod')return `${CREDS.host}/movie/${enc(CREDS.user)}/${enc(CREDS.pass)}/${id}.${ext}`;
  return null;
}
async function play(c){
  if(state.type==='series')return playSeries(c);
  state.activeCh=c.stream_id; renderChannels();
  $('#placeholder').style.display='none';
  const isLive=state.type==='live';
  $('#now').innerHTML=`${isLive?'<div class="live-tag"><span class="pulse"></span>Live</div>':''}<h2>${esc(c.name)}</h2><div class="now-sub">${isLive?'Live stream':'On demand'} · ${(c.container_extension||'m3u8').toUpperCase()}</div><div class="buffering" id="buf">Connecting…</div>`;
  loadStream(streamUrl(c),isLive);
}
async function playSeries(c){
  state.activeCh=c.series_id; renderChannels(); $('#placeholder').style.display='none';
  $('#now').innerHTML=`<h2>${esc(c.name)}</h2><div class="buffering">Loading episodes…</div>`;
  try{
    const info=await api(`action=get_series_info&series_id=${c.series_id}`);
    const seasons=info.episodes||{}, keys=Object.keys(seasons);
    if(!keys.length)throw new Error('No episodes found.');
    const ep=seasons[keys[0]][0], ext=ep.container_extension||'mp4';
    const url=`${CREDS.host}/series/${enc(CREDS.user)}/${enc(CREDS.pass)}/${ep.id}.${ext}`;
    let epHtml='<div class="now-sub" style="margin-top:16px">Episodes</div>';
    keys.forEach(sk=>seasons[sk].forEach(e=>{
      const eu=`${CREDS.host}/series/${enc(CREDS.user)}/${enc(CREDS.pass)}/${e.id}.${e.container_extension||'mp4'}`;
      epHtml+=`<div class="ch focusable" tabindex="0" style="margin-top:6px" onclick='window.__playEp(${JSON.stringify(eu)})'><div class="noimg">▶</div><div class="meta"><div class="title">S${sk} · ${esc(e.title||('Ep '+e.episode_num))}</div></div></div>`;
    }));
    $('#now').innerHTML=`<h2>${esc(c.name)}</h2><div class="now-sub">${keys.length} season(s)</div><div id="buf" class="buffering">Loading…</div>${epHtml}`;
    loadStream(url,false);
  }catch(e){ $('#now').innerHTML=`<h2>${esc(c.name)}</h2><div class="stream-err">${esc(e.message)}</div>`; }
}
window.__playEp=url=>{ $('#placeholder').style.display='none'; loadStream(url,false); };

function loadStream(url,isLive){
  const video=$('#video');
  if(hls){hls.destroy();hls=null;}
  video.pause(); video.removeAttribute('src'); video.load();
  const onErr=m=>{const b=$('#buf');if(b){b.className='stream-err';b.textContent=m;}};
  const onReady=()=>{const b=$('#buf');if(b)b.remove();};
  const isM3u8=url.includes('.m3u8');
  if(isM3u8&&window.Hls&&Hls.isSupported()){
    hls=new Hls({lowLatencyMode:isLive,enableWorker:true,maxBufferLength:isLive?10:30});
    hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{onReady();video.play().catch(()=>{});});
    hls.on(Hls.Events.ERROR,(_,d)=>{ if(d.fatal){ if(d.type===Hls.ErrorTypes.NETWORK_ERROR)onErr('Network error — stream offline or unreachable.'); else if(d.type===Hls.ErrorTypes.MEDIA_ERROR)hls.recoverMediaError(); else onErr('Playback failed: '+d.details); } });
  } else {
    video.src=url;
    video.addEventListener('loadeddata',onReady,{once:true});
    video.addEventListener('error',()=>onErr('Could not play this stream.'),{once:true});
    video.play().catch(()=>{});
  }
}

/* ---------- Type switch ---------- */
document.querySelectorAll('.seg button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state.type=b.dataset.type; state.activeCat=null; state.channels=[];
    $('#chList').innerHTML='<div class="empty">Pick a category.</div>';
    loadCategories();
  };
});

/* ================= D-PAD / REMOTE NAVIGATION ================= */
function focusables(){ return [...document.querySelectorAll('.focusable')].filter(el=>el.offsetParent!==null); }
function focusEl(el){ if(!el)return; document.querySelectorAll('.focused').forEach(x=>x.classList.remove('focused')); el.classList.add('focused'); el.focus({preventScroll:false}); el.scrollIntoView({block:'nearest'}); }
function current(){ return document.querySelector('.focused')||document.activeElement; }
function focusFirstInCol(col){ const el=document.querySelector(`[data-col="${col}"] .focusable`); focusEl(el); }
function focusFirstInLogin(){ focusEl($('#host')); }

// Geometric nearest-neighbor navigation
function move(dir){
  const els=focusables(); const cur=current();
  if(!cur||!els.includes(cur)){ focusEl(els[0]); return; }
  const cr=cur.getBoundingClientRect();
  const cx=cr.left+cr.width/2, cy=cr.top+cr.height/2;
  let best=null, bestScore=Infinity;
  for(const el of els){
    if(el===cur)continue;
    const r=el.getBoundingClientRect();
    const x=r.left+r.width/2, y=r.top+r.height/2;
    const dx=x-cx, dy=y-cy;
    let primary, cross;
    if(dir==='right'){ if(dx<=8)continue; primary=dx; cross=Math.abs(dy); }
    else if(dir==='left'){ if(dx>=-8)continue; primary=-dx; cross=Math.abs(dy); }
    else if(dir==='down'){ if(dy<=8)continue; primary=dy; cross=Math.abs(dx); }
    else { if(dy>=-8)continue; primary=-dy; cross=Math.abs(dx); }
    const score=primary+cross*2.5; // penalize cross-axis drift
    if(score<bestScore){ bestScore=score; best=el; }
  }
  if(best)focusEl(best);
}

document.addEventListener('keydown',e=>{
  const k=e.key, code=e.keyCode;
  const isTyping=document.activeElement&&document.activeElement.tagName==='INPUT';
  // Media/back keys
  if(k==='Backspace'||k==='XF86Back'||code===10009||code===461){
    const vw=$('#videoWrap');
    if(vw.classList.contains('fs')){ vw.classList.remove('fs'); e.preventDefault(); return; }
  }
  if(k==='ArrowRight'){ if(!isTyping){move('right');e.preventDefault();} }
  else if(k==='ArrowLeft'){ if(!isTyping){move('left');e.preventDefault();} }
  else if(k==='ArrowUp'){ move('up'); e.preventDefault(); }
  else if(k==='ArrowDown'){ move('down'); e.preventDefault(); }
  else if(k==='Enter'||code===13){
    const cur=current();
    if(cur){
      if(cur.tagName==='INPUT'){ return; } // let it type / soft keyboard
      cur.click(); e.preventDefault();
    }
  }
});

// Double-click / OK on video toggles fullscreen playback
$('#videoWrap').addEventListener('click',()=>{
  const vw=$('#videoWrap');
  if($('#video').src||hls){ vw.classList.toggle('fs'); }
});

/* ---------- Boot ---------- */
(function boot(){
  const saved=store.creds;
  if(saved){ $('#host').value=saved.host; $('#user').value=saved.user; $('#pass').value=saved.pass; CREDS=saved;
    connect(saved.host,saved.user,saved.pass).then(enterApp).catch(()=>{ setTimeout(focusFirstInLogin,100); });
  } else { setTimeout(focusFirstInLogin,100); }
})();
</script>
