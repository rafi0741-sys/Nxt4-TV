name: Build Android TV APK

# Builds a debug APK on every push, and on manual trigger.
# Download the finished APK from the run's "Artifacts" section.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate web files and ensure www/ exists
        run: |
          set -e
          echo "Repo contents:"
          ls -la
          if [ ! -f www/index.html ]; then
            echo "www/index.html not found — searching for index.html..."
            SRC=$(find . -name index.html -not -path './node_modules/*' | head -n1)
            if [ -z "$SRC" ]; then
              echo "ERROR: no index.html anywhere in the repo."; exit 1
            fi
            echo "Found index.html at: $SRC"
            mkdir -p www
            cp "$(dirname "$SRC")"/* www/ 2>/dev/null || true
          fi
          echo "www/ now contains:"
          ls -la www

      - name: Fetch HLS.js into www
        run: |
          curl -fL --retry 3 https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js -o www/hls.min.js
          ls -la www

      - name: Ensure Capacitor config exists
        run: |
          if [ ! -f capacitor.config.json ]; then
            cat > capacitor.config.json <<'JSON'
          {
            "appId": "com.nxt4.tv",
            "appName": "Nxt4 TV",
            "webDir": "www",
            "server": { "androidScheme": "http", "cleartext": true },
            "android": { "allowMixedContent": true }
          }
          JSON
          fi
          if [ ! -f package.json ]; then
            cat > package.json <<'JSON'
          {
            "name": "nxt4-tv",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/android": "^6.1.2",
              "@capacitor/core": "^6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.2"
            }
          }
          JSON
          fi
          cat capacitor.config.json

      - name: Install Capacitor
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Patch manifest for Android TV
        run: |
          python3 scripts/patch_manifest.py android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nxt4-tv-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
